{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGL Admin Portal — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/portal.css' %}">
</head>
<body class="portal-login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand text-center mb-4">
        <img src="{% static 'images/inter.jpeg' %}" alt="IGL" class="login-logo mb-3">
        <h4 class="mb-0">IGL Admin Portal</h4>
        <p class="text-muted small">Operations Staff Only</p>
      </div>
      {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }} py-2">
          <i class="fas fa-exclamation-circle me-2"></i>{{ msg }}
        </div>
        {% endfor %}
      {% endif %}
      <form method="post" action="{% url 'portal_login' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" name="username" value="{{ username|default:'' }}" class="form-control" required autofocus autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" name="password" id="passwordInput" class="form-control" required autocomplete="current-password">
            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-portal-login w-100">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>
      <p class="text-center text-muted small mt-4">
        Not staff? <a href="{% url 'home' %}">← Return to public site</a>
      </p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePwd() {
      const inp = document.getElementById('passwordInput');
      const ico = document.getElementById('eyeIcon');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      ico.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }
  </script>
</body>
</html>
