{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — Server Error | IGL</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: #f8f9fa; font-family: 'IBM Plex Sans', sans-serif; }
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-code { font-size: 6rem; font-weight: 800; color: #bc4949; line-height: 1; }
    .igl-btn { background: #bc4949; color: white; border: none; padding: 10px 28px; border-radius: 6px; text-decoration: none; }
    .igl-btn:hover { background: #a03838; color: white; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="text-center px-3">
      <div class="error-code">500</div>
      <h2 class="mt-2 mb-3">Internal Server Error</h2>
      <p class="text-muted mb-4">Something went wrong on our end. Our team has been notified.</p>
      <a href="/" class="igl-btn"><i class="fas fa-home me-2"></i>Go Home</a>
    </div>
  </div>
</body>
</html>
